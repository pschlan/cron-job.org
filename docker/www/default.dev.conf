# Development variant of the www reverse proxy configuration.
#
# Instead of proxying to the production (nginx-served, pre-built) frontend and
# status page containers on port 80, this proxies to the CRA development
# servers on port 3000 and forwards the WebSocket upgrade used for hot module
# reloading.
#
# Used by docker-compose.dev.yml.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    server_name www.local;

    location /api {
        fastcgi_split_path_info ^(/api)(/.+)$;
        fastcgi_pass api:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location / {
        proxy_pass http://frontend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    server_name ~^(.*)\.status\.cron-job\.org\.localhost$ ;

    location /api {
        fastcgi_split_path_info ^(/api)(/.+)$;
        fastcgi_pass api:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location / {
        proxy_pass http://statuspage:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
